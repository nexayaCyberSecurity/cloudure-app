name: "Deploy: EC2 Production"

on:
  push:
    branches:
      - "master"
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy"
        required: false
        default: "master"
        type: string
      rebuild_ui:
        description: "Rebuild UI with external API URL"
        required: false
        default: true
        type: boolean

concurrency:
  group: "deploy-ec2-production-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          EC2_PORT: ${{ secrets.PROD_EC2_PORT }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          PORT="${EC2_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${PORT}" -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Build UI image on runner and load on EC2
        env:
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          EC2_PORT: ${{ secrets.PROD_EC2_PORT }}
          EC2_USER: ${{ secrets.PROD_EC2_USER }}
          APP_DOMAIN: ${{ secrets.PROD_APP_DOMAIN }}
          REBUILD_UI: ${{ github.event.inputs.rebuild_ui }}
        run: |
          set -euo pipefail

          REBUILD_UI="${REBUILD_UI:-true}"
          PORT="${EC2_PORT:-22}"

          if [[ "${REBUILD_UI}" != "true" ]]; then
            echo "Skipping UI rebuild by request (rebuild_ui=false)."
            exit 0
          fi

          if [[ -z "${APP_DOMAIN}" ]]; then
            echo "APP_DOMAIN is required when rebuild_ui=true"
            exit 1
          fi

          docker build \
            --progress=plain \
            --target prod \
            --build-arg NEXT_PUBLIC_API_BASE_URL="https://${APP_DOMAIN}/api/v1" \
            --build-arg NEXT_PUBLIC_API_DOCS_URL="https://${APP_DOMAIN}/api/v1/docs" \
            --build-arg NEXT_PUBLIC_PROWLER_RELEASE_VERSION="${GITHUB_SHA:-latest}" \
            -t prowler-ui-custom:latest \
            ./ui

          docker save prowler-ui-custom:latest | ssh \
            -i ~/.ssh/id_rsa \
            -p "${PORT}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=15 \
            "${EC2_USER}@${EC2_HOST}" \
            "docker load"

      - name: Deploy to EC2 over SSH
        env:
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          EC2_PORT: ${{ secrets.PROD_EC2_PORT }}
          EC2_USER: ${{ secrets.PROD_EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.PROD_EC2_DEPLOY_PATH }}
          APP_DOMAIN: ${{ secrets.PROD_APP_DOMAIN }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch }}
          REBUILD_UI: ${{ github.event.inputs.rebuild_ui }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          DEPLOY_BRANCH="${DEPLOY_BRANCH:-master}"
          REBUILD_UI="${REBUILD_UI:-true}"

          if [[ -z "${EC2_HOST}" || -z "${EC2_USER}" || -z "${EC2_SSH_PRIVATE_KEY}" || -z "${DEPLOY_PATH}" ]]; then
            echo "Missing required production secrets. Required: PROD_EC2_HOST, PROD_EC2_USER, PROD_EC2_SSH_PRIVATE_KEY, PROD_EC2_DEPLOY_PATH"
            exit 1
          fi

          PORT="${EC2_PORT:-22}"

          ssh \
            -i ~/.ssh/id_rsa \
            -p "${PORT}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=15 \
            "${EC2_USER}@${EC2_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' APP_DOMAIN='${APP_DOMAIN}' REBUILD_UI='${REBUILD_UI}' GITHUB_REPOSITORY='${GITHUB_REPOSITORY}' GITHUB_SERVER_URL='${GITHUB_SERVER_URL}' bash -s" <<'REMOTE'
          set -euo pipefail

          if [[ ! -d "${DEPLOY_PATH}" ]]; then
            mkdir -p "${DEPLOY_PATH}"
          fi

          cd "${DEPLOY_PATH}"

          if [[ ! -d .git ]]; then
            echo "${DEPLOY_PATH} does not contain a git repository. Clone it once on the server, then re-run this workflow."
            exit 1
          fi

          git fetch origin "${DEPLOY_BRANCH}"
          if git show-ref --verify --quiet "refs/heads/${DEPLOY_BRANCH}"; then
            git checkout "${DEPLOY_BRANCH}"
          else
            git checkout -b "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
          fi
          git pull --ff-only origin "${DEPLOY_BRANCH}"

          mkdir -p _data/api _data/postgres _data/valkey _data/neo4j
          if command -v sudo >/dev/null 2>&1; then
            sudo -n chown -R 1000:1000 _data/api || true
          fi

          if [[ "${REBUILD_UI}" == "true" ]]; then
            cat > docker-compose.override.yml <<'EOF'
          services:
            ui:
              image: prowler-ui-custom:latest
          EOF
          else
            rm -f docker-compose.override.yml
          fi

          if [[ "${REBUILD_UI}" == "true" ]]; then
            docker compose pull api-init api worker worker-beat postgres valkey neo4j mcp-server
          else
            docker compose pull
          fi

          if ! docker compose up -d --remove-orphans; then
            echo "docker compose up failed. Collecting diagnostics..."
            docker compose ps || true
            docker compose logs --tail=200 api postgres valkey neo4j || true
            api_container_id="$(docker compose ps -q api || true)"
            if [[ -n "${api_container_id}" ]]; then
              docker inspect --format='{{json .State.Health}}' "${api_container_id}" || true
            fi
            exit 1
          fi

          docker compose ps

          healthcheck_url() {
            url="$1"
            if command -v curl >/dev/null 2>&1; then
              curl -fsS --max-time 15 "$url" >/dev/null
            else
              wget -q -O /dev/null "$url"
            fi
          }

          if ! healthcheck_url "http://127.0.0.1:8080/api/v1/"; then
            echo "API health endpoint unreachable after deploy. Collecting diagnostics..."
            docker compose ps || true
            docker compose logs --tail=200 api postgres valkey neo4j || true
            exit 1
          fi

          if ! healthcheck_url "http://127.0.0.1:3000/"; then
            echo "UI endpoint unreachable after deploy. Collecting diagnostics..."
            docker compose ps || true
            docker compose logs --tail=200 ui || true
            exit 1
          fi

          echo "Post-deploy health checks passed (API and UI reachable on EC2)."
          REMOTE